[agent]
  interval = "10s"
  round_interval = true
  metric_batch_size = 1000
  metric_buffer_limit = 10000

[[outputs.influxdb_v2]]
  urls = ["http://influxdb:8086"]
  token = "${INFLUXDB_INIT_ADMIN_TOKEN}"
  organization = "${INFLUXDB_INIT_ORG}"
  bucket = "${INFLUXDB_INIT_BUCKET}"

[[inputs.cpu]]
  percpu = true
  totalcpu = true

[[inputs.mem]]
