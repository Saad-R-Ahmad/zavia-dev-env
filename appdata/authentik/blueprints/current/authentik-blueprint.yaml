version: 1
metadata:
  name: Zavia Core Infrastructure
  labels:
    app: zavia

entries:
  # Groups: platform roles only. Zavia is single-instance — no tenant/customer
  # groups are provisioned. See Overview/Authentik_OIDC_Infrastructure.md.
  #
  # Confirmed policy decision (2026-07-18): zavia-platform-admins is a Zavia
  # application role, not an Authentik IdP superuser. Break-glass Authentik
  # administration is managed separately through Authentik's own admin group.
  - model: authentik_core.group
    state: present
    identifiers:
      name: zavia-platform-admins
    attrs:
      is_superuser: false
  - model: authentik_core.group
    state: present
    identifiers:
      name: zavia-iot-engineers
  - model: authentik_core.group
    state: present
    identifiers:
      name: zavia-plant-operators

  # Custom scope mapping so the UNS Builder OIDC provider includes the
  # Zavia role-group claim FastAPI's route guards rely on
  # (api/deps.py:_claims_to_user_dict reads claims["groups"]).
  - model: authentik_providers_oauth2.scopemapping
    state: present
    identifiers:
      name: "OAuth Mapping: OpenID 'groups'"
    attrs:
      name: "OAuth Mapping: OpenID 'groups'"
      description: Zavia role groups claim
      scope_name: groups
      expression: |
        return {
            "groups": list(
                request.user.ak_groups.values_list("name", flat=True).distinct()
            )
        }

  # OAuth2 Provider for UNS Builder
  - model: authentik_providers_oauth2.oauth2provider
    state: present
    identifiers:
      name: UNS Builder Provider
    attrs:
      client_id: !Env UNS_OIDC_CLIENT_ID
      client_secret: !Env UNS_OIDC_CLIENT_SECRET
      authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-explicit-consent]]
      invalidation_flow: !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
      client_type: confidential
      jwt_alg: RS256
      signing_key: !Find [authentik_crypto.certificatekeypair, [name, "authentik Self-signed Certificate"]]
      redirect_uris:
        - matching_mode: strict
          url: https://uns.zavia.lan/auth/callback
      property_mappings:
        - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-email]]
        - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-openid]]
        - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-profile]]
        - !Find [authentik_providers_oauth2.scopemapping, [name, "OAuth Mapping: OpenID 'groups'"]]

  # Application for UNS Builder
  - model: authentik_core.application
    state: present
    identifiers:
      slug: uns
    attrs:
      name: UNS Builder
      provider: !Find [authentik_providers_oauth2.oauth2provider, [name, UNS Builder Provider]]
      meta_launch_url: https://uns.zavia.lan
