services:
  uns-builder:
    build:
      context: ../../uns_builder
      dockerfile: Dockerfile
    restart: unless-stopped
    container_name: zavia-uns-builder
    profiles: ["apps", "all"]
    command: uvicorn main:app --app-dir /app/src --host 0.0.0.0 --port 8000 --reload --proxy-headers --forwarded-allow-ips='*'
    networks:
      - traefik_proxy
      - default
    environment:
      - ENV=development
      - UVICORN_RELOAD=true
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=${POSTGRES_DB}
      - DB_USER=${POSTGRES_USER}
      - DB_PASSWORD=${POSTGRES_PASSWORD}
      - mqtt_broker=mosquitto
      - mqtt_port=1883
      - mqtt_username=${UNS_MQTT_USERNAME}
      - mqtt_password=${UNS_MQTT_PASSWORD}
      - mqtt_client_id=${UNS_MQTT_CLIENT_ID}
      - mqtt_tls_enabled=${UNS_MQTT_TLS_ENABLED}
      - mqtt_will_topic=${UNS_MQTT_WILL_TOPIC}
      - mqtt_will_payload=${UNS_MQTT_WILL_PAYLOAD}
      - OIDC_CLIENT_ID=Qp5tqrUExqPzZfOuyiO8ptGk6hbkmSEJhkUF6jms
      - OIDC_CLIENT_SECRET=qmqm5IOhW4pHCcEAJayJoKfCNIvzV9qBkGK5WqJskNxa85miczMHXhkYOXCd2DniI5JZmedGMirwiJuoBfbn33z07eCQeh592xqoSY6aqTZCggaEQZ3kOejw4nhjsEiS
      - OIDC_ISSUER_URL=https://auth.zavia.lan/application/o/uns/
    volumes:
      - ../../uns_builder/app/src:/app/src
    ports:
      - "${UNS_BUILDER_HOST_PORT:-8000}:8000"
    labels:
      - traefik.enable=true
      # HTTP Routers
      - traefik.http.routers.uns-rtr-http.entrypoints=web
      - traefik.http.routers.uns-rtr-http.rule=Host(`uns.${DOMAINNAME_1}`)
      - traefik.http.routers.uns-rtr-http.service=uns-svc
      - traefik.http.routers.uns-rtr.entrypoints=websecure
      - traefik.http.routers.uns-rtr.rule=Host(`uns.${DOMAINNAME_1}`)
      - traefik.http.routers.uns-rtr.tls=true
      # Services
      - traefik.http.routers.uns-rtr.service=uns-svc
      - traefik.http.services.uns-svc.loadbalancer.server.port=8000
      #middleware chain
      - "traefik.http.routers.uns-rtr.middlewares=middlewares-secure-headers@file"
      - "traefik.http.routers.uns-rtr-http.middlewares=middlewares-secure-headers@file"
