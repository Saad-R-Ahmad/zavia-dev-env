services:
  authentik-blueprint-apply:
    image: ghcr.io/goauthentik/server:2025.6
    restart: "no"
    profiles: ["core", "auth", "all"]
    command:
      - shell
      - -c
      - |
        from pathlib import Path
        import hashlib
        from django.core.management import call_command

        blueprint = Path('/blueprints/custom/authentik-blueprint.yaml')
        hash_file = Path('/media/.authentik-blueprint.sha256')

        if not blueprint.exists():
            print('No blueprint at /blueprints/custom/authentik-blueprint.yaml, skipping apply')
            raise SystemExit(0)

        new_hash = hashlib.sha256(blueprint.read_bytes()).hexdigest()
        old_hash = hash_file.read_text().strip() if hash_file.exists() else ''

        if new_hash == old_hash:
            print('Blueprint unchanged, skipping apply')
            raise SystemExit(0)

        print('Applying blueprint /blueprints/custom/authentik-blueprint.yaml')
        apply_ok = True
        try:
          call_command('apply_blueprint', str(blueprint))
        except SystemExit as exc:
          # apply_blueprint may terminate the shell command with SystemExit(0)
          if exc.code not in (0, None):
            apply_ok = False
            print(f'Blueprint apply exited non-zero: {exc.code}')
        except Exception as exc:
          apply_ok = False
          print(f'Blueprint apply error: {exc}')

        hash_file.write_text(new_hash + '\n')
        if apply_ok:
          print('Blueprint apply completed and hash updated')
        else:
          print('Blueprint apply had errors; hash updated to prevent repeated retries on unchanged blueprint')
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - default
    environment:
      - TZ=${TZ}
      - AUTHENTIK_SECRET_KEY=${AUTHENTIK_SECRET_KEY}
      - AUTHENTIK_REDIS__HOST=redis
      - AUTHENTIK_REDIS__PORT=6379
      - AUTHENTIK_REDIS__PASSWORD=${REDIS_PASSWORD}
      - AUTHENTIK_POSTGRESQL__HOST=postgres
      - AUTHENTIK_POSTGRESQL__PORT=5432
      - AUTHENTIK_POSTGRESQL__NAME=${AUTHENTIK_DB_NAME}
      - AUTHENTIK_POSTGRESQL__USER=${AUTHENTIK_DB_USER}
      - AUTHENTIK_POSTGRESQL__PASSWORD=${AUTHENTIK_DB_PASSWORD}
    volumes:
      - ${DOCKERDIR}/appdata/authentik/media:/media
      - ${DOCKERDIR}/appdata/authentik/blueprints/current:/blueprints/custom:ro

  authentik-server:
    image: ghcr.io/goauthentik/server:2025.6
    restart: unless-stopped
    container_name: zavia-authentik
    profiles: ["core", "auth", "all"]
    command: server
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      authentik-blueprint-apply:
        condition: service_completed_successfully
    networks:
      - traefik_proxy
      - default
    environment:
      - TZ=${TZ}
      - AUTHENTIK_SECRET_KEY=${AUTHENTIK_SECRET_KEY}
      - AUTHENTIK_REDIS__HOST=redis
      - AUTHENTIK_REDIS__PORT=6379
      - AUTHENTIK_REDIS__PASSWORD=${REDIS_PASSWORD}
      - AUTHENTIK_POSTGRESQL__HOST=postgres
      - AUTHENTIK_POSTGRESQL__PORT=5432
      - AUTHENTIK_POSTGRESQL__NAME=${AUTHENTIK_DB_NAME}
      - AUTHENTIK_POSTGRESQL__USER=${AUTHENTIK_DB_USER}
      - AUTHENTIK_POSTGRESQL__PASSWORD=${AUTHENTIK_DB_PASSWORD}
      - AUTHENTIK_EMAIL__HOST=${AUTHENTIK_EMAIL__HOST}
      - AUTHENTIK_EMAIL__PORT=${AUTHENTIK_EMAIL__PORT}
      - AUTHENTIK_EMAIL__USERNAME=${AUTHENTIK_EMAIL__USERNAME}
      - AUTHENTIK_EMAIL__PASSWORD=${AUTHENTIK_EMAIL__PASSWORD}
      - AUTHENTIK_EMAIL__USE_TLS=${AUTHENTIK_EMAIL__USE_TLS}
      - AUTHENTIK_EMAIL__FROM=${AUTHENTIK_EMAIL__FROM}
    volumes:
      - ${DOCKERDIR}/appdata/authentik/media:/media
      - ${DOCKERDIR}/appdata/authentik/custom-templates:/templates
    labels:
      - traefik.enable=true
      - traefik.http.routers.auth-rtr-http.entrypoints=web
      - traefik.http.routers.auth-rtr-http.rule=Host(`auth.${DOMAINNAME_1}`)
      - traefik.http.routers.auth-rtr-http.middlewares=auth-https-redirect
      - traefik.http.middlewares.auth-https-redirect.redirectscheme.scheme=https
      - traefik.http.middlewares.auth-https-redirect.redirectscheme.permanent=true
      - traefik.http.routers.auth-rtr.entrypoints=websecure
      - traefik.http.routers.auth-rtr.rule=Host(`auth.${DOMAINNAME_1}`)
      - traefik.http.routers.auth-rtr.tls=true
      - traefik.http.routers.auth-rtr.service=auth-svc
      - traefik.http.services.auth-svc.loadbalancer.server.port=9000

  authentik-worker:
    image: ghcr.io/goauthentik/server:2025.6
    restart: unless-stopped
    profiles: ["core", "auth", "all"]
    command: worker
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      authentik-blueprint-apply:
        condition: service_completed_successfully
    networks:
      - default
    environment:
      - TZ=${TZ}
      - AUTHENTIK_SECRET_KEY=${AUTHENTIK_SECRET_KEY}
      - AUTHENTIK_REDIS__HOST=redis
      - AUTHENTIK_REDIS__PORT=6379
      - AUTHENTIK_REDIS__PASSWORD=${REDIS_PASSWORD}
      - AUTHENTIK_POSTGRESQL__HOST=postgres
      - AUTHENTIK_POSTGRESQL__PORT=5432
      - AUTHENTIK_POSTGRESQL__NAME=${AUTHENTIK_DB_NAME}
      - AUTHENTIK_POSTGRESQL__USER=${AUTHENTIK_DB_USER}
      - AUTHENTIK_POSTGRESQL__PASSWORD=${AUTHENTIK_DB_PASSWORD}
    volumes:
      - ${DOCKERDIR}/appdata/authentik/media:/media
      - ${DOCKERDIR}/appdata/authentik/custom-templates:/templates
